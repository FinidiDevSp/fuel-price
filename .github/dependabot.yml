# ──────────────────────────────────────────────
# Dependabot - Fuel Price
# ──────────────────────────────────────────────
# Revisa semanalmente si hay actualizaciones
# de dependencias npm y de GitHub Actions.
# Crea PRs automáticas con los bumps.
# ──────────────────────────────────────────────

version: 2
updates:
  # Dependencias npm
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Madrid
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
    open-pull-requests-limit: 10

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Madrid
    commit-message:
      prefix: "ci(deps)"
    labels:
      - ci
