# ──────────────────────────────────────────────
# CodeQL - Análisis de seguridad
# ──────────────────────────────────────────────
# Escanea el código TypeScript/JavaScript en busca
# de vulnerabilidades conocidas (inyección, XSS, etc.).
# Se ejecuta semanalmente y en cada push a main.
# ──────────────────────────────────────────────

name: CodeQL

on:
  push:
    branches: [main]
  schedule:
    # Cada lunes a las 9:00 hora de Madrid
    - cron: "0 7 * * 1"

jobs:
  analyze:
    name: Análisis de seguridad
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Ejecutar análisis CodeQL
        uses: github/codeql-action/analyze@v3
